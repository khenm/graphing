<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledge Graph</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #f8f9fa;
    }

    #graph {
      width: 100vw;
      height: 100vh;
    }

    #refreshBtn {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10;
      padding: 8px 16px;
      font-size: 13px;
      font-family: sans-serif;
      cursor: pointer;
      border-radius: 8px;
      border: 1px solid #94a3b8;
      background: #e2e8f0;
      color: #374151;
      transition: background 0.15s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    #refreshBtn:hover { background: #cbd5e1; }

    #searchBar {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: 260px;
      padding: 8px 16px;
      font-size: 13px;
      font-family: sans-serif;
      border-radius: 20px;
      border: 1px solid #94a3b8;
      background: rgba(255,255,255,0.92);
      color: #374151;
      outline: none;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    #searchBar:focus {
      border-color: #64748b;
      box-shadow: 0 1px 8px rgba(100,116,139,0.18);
    }

    #searchBar::placeholder { color: #94a3b8; }

    #tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(255,255,255,0.92);
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
      font-family: sans-serif;
      color: #374151;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
      display: none;
      max-width: 200px;
    }
  </style>
</head>
<body>
  <div id="graph"></div>
  <input id="searchBar" type="text" placeholder="Search nodes…" autocomplete="off" spellcheck="false" />
  <button id="refreshBtn">Refresh Graph</button>
  <div id="tooltip"></div>

  <script src="theme.js"></script>
  <script src="https://unpkg.com/force-graph@1.49.0/dist/force-graph.min.js"></script>
  <script>
    const tooltip = document.getElementById('tooltip');
    let graph = null;
    let hoveredNode = null;
    let hoveredLink = null;
    let componentNodes = new Set(); // IDs of nodes in the hovered connected component
    let searchQuery = '';
    let matchedNodes = new Set(); // IDs of nodes matching the current search query

    function nodeId(n) { return n != null && n.id != null ? n.id : n; }

    function linkTagColor(link) {
      const src = link.source;
      const tag = (src && src.group) ? src.group : '';
      return GraphTheme.nodes.tagColors[tag] || GraphTheme.links.hoverColor;
    }

    function nodeColor(node) {
      const tag = node.group || '';
      return GraphTheme.nodes.tagColors[tag] || GraphTheme.nodes.defaultColor;
    }

    function updateSearch(query) {
      searchQuery = query.trim().toLowerCase();
      if (!searchQuery || !graph) { matchedNodes = new Set(); return; }
      const { nodes } = graph.graphData();
      matchedNodes = new Set(
        nodes
          .filter(n => (n.name || n.id).toLowerCase().includes(searchQuery))
          .map(n => n.id)
      );
    }

    // BFS on the undirected graph to find every node reachable from startNode
    function getConnectedComponent(startNode, nodes, links) {
      const adj = new Map(nodes.map(n => [n.id, []]));
      links.forEach(l => {
        const s = nodeId(l.source), t = nodeId(l.target);
        if (adj.has(s)) adj.get(s).push(t);
        if (adj.has(t)) adj.get(t).push(s);
      });
      const visited = new Set();
      const queue = [startNode.id];
      while (queue.length) {
        const id = queue.shift();
        if (visited.has(id)) continue;
        visited.add(id);
        (adj.get(id) || []).forEach(nb => { if (!visited.has(nb)) queue.push(nb); });
      }
      return visited;
    }

    function initGraph(data) {
      if (graph) graph._destructor();

      graph = ForceGraph()(document.getElementById('graph'))
        .backgroundColor(GraphTheme.canvas.background)
        .graphData(data)

        // Links
        .linkColor(link => {
          if (hoveredNode) {
            const s = nodeId(link.source), t = nodeId(link.target);
            return (componentNodes.has(s) && componentNodes.has(t))
              ? linkTagColor(link)
              : 'rgba(203,213,225,0.12)';
          }
          return link === hoveredLink ? linkTagColor(link) : GraphTheme.links.color;
        })
        .linkWidth(link => {
          if (hoveredNode) {
            const s = nodeId(link.source), t = nodeId(link.target);
            return (componentNodes.has(s) && componentNodes.has(t))
              ? GraphTheme.links.width * 2
              : GraphTheme.links.width * 0.4;
          }
          return link === hoveredLink ? GraphTheme.links.width * 2 : GraphTheme.links.width;
        })
        .linkDirectionalArrowLength(GraphTheme.links.arrowLength)
        .linkDirectionalArrowRelPos(1)
        .linkDirectionalArrowColor(link => {
          if (hoveredNode) {
            const s = nodeId(link.source), t = nodeId(link.target);
            return (componentNodes.has(s) && componentNodes.has(t))
              ? linkTagColor(link)
              : 'rgba(203,213,225,0.12)';
          }
          return link === hoveredLink ? linkTagColor(link) : GraphTheme.links.color;
        })
        .onLinkHover(link => { hoveredLink = link || null; })

        // Node canvas drawing
        .nodeCanvasObject((node, ctx, globalScale) => {
          const r = GraphTheme.nodes.radius;
          const isHovered = node === hoveredNode;
          const inComponent = !hoveredNode || componentNodes.has(node.id);
          const isMatched = searchQuery ? matchedNodes.has(node.id) : true;

          ctx.save();
          // Search dims unmatched; hover dims out-of-component — search takes priority
          ctx.globalAlpha = searchQuery
            ? (isMatched ? 1 : 0.12)
            : (inComponent ? 1 : 0.15);

          // Search highlight ring (drawn behind the node fill)
          if (searchQuery && isMatched) {
            ctx.beginPath();
            ctx.arc(node.x, node.y, r + 3 / globalScale, 0, 2 * Math.PI);
            ctx.strokeStyle = nodeColor(node);
            ctx.lineWidth = 2.5 / globalScale;
            ctx.stroke();
          }

          // Node circle
          ctx.beginPath();
          ctx.arc(node.x, node.y, r, 0, 2 * Math.PI);
          ctx.fillStyle = nodeColor(node);
          ctx.fill();

          if (isHovered) {
            ctx.strokeStyle = GraphTheme.nodes.hoverOutline;
            ctx.lineWidth = GraphTheme.nodes.hoverOutlineWidth / globalScale;
            ctx.stroke();
          }

          // Label
          const label = node.name || node.id;
          const fontSize = Math.max(10 / globalScale, 3);
          ctx.font = `${fontSize}px Sans-Serif`;
          ctx.fillStyle = GraphTheme.nodes.textColor;
          ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';
          ctx.fillText(label, node.x + r + (GraphTheme.nodes.textOffset / globalScale), node.y);

          ctx.restore();
        })
        .nodePointerAreaPaint((node, color, ctx) => {
          ctx.beginPath();
          ctx.arc(node.x, node.y, GraphTheme.nodes.radius + 4, 0, 2 * Math.PI);
          ctx.fillStyle = color;
          ctx.fill();
        })

        // Hover — compute connected component for highlighting
        .onNodeHover(node => {
          hoveredNode = node || null;
          if (node) {
            const { nodes, links } = graph.graphData();
            componentNodes = getConnectedComponent(node, nodes, links);
            tooltip.style.display = 'block';
            tooltip.textContent = `${node.name || node.id}${node.group ? ' · ' + node.group : ''}`;
          } else {
            componentNodes = new Set();
            tooltip.style.display = 'none';
          }
        })

        // Drag — keep every OTHER node pinned each frame so physics can't push them
        .onNodeDrag(node => {
          graph.graphData().nodes.forEach(n => {
            if (n !== node) { n.fx = n.x; n.fy = n.y; }
          });
        })

        // Re-pin dragged node at its final position
        .onNodeDragEnd(node => {
          node.fx = node.x;
          node.fy = node.y;
        })

        // Pin every node once the simulation cools — prevents physics from
        // moving non-dragged nodes when you drag one around
        .onEngineStop(() => {
          graph.graphData().nodes.forEach(n => {
            n.fx = n.x;
            n.fy = n.y;
          });
        });

      graph.d3Force('charge').strength(-120);
      graph.d3Force('link').distance(80);
    }

    document.addEventListener('mousemove', e => {
      if (tooltip.style.display === 'block') {
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top  = (e.clientY - 10) + 'px';
      }
    });

    function loadGraph() {
      fetch('graph_data.json?t=' + Date.now())
        .then(r => {
          if (!r.ok) throw new Error('Failed to load graph_data.json');
          return r.json();
        })
        .then(data => initGraph(data))
        .catch(err => console.error('Graph load error:', err));
    }

    document.getElementById('searchBar').addEventListener('input', e => {
      updateSearch(e.target.value);
    });

    document.getElementById('refreshBtn').addEventListener('click', () => {
      document.getElementById('searchBar').value = '';
      updateSearch('');
      loadGraph();
    });

    loadGraph();
  </script>
</body>
</html>
